<!DOCTYPE html>
<html style="background:#ff0000">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Splash Test</title>
  <script src="https://unpkg.com/ios-pwa-splash-screen"></script>
  <script>
    window.IosPwaSplashScreen.generateIosPwaSplash({ icon: { url: 'icon.png', backgroundColor: '#ff0000' } })
      .then(() => { document.getElementById('status').textContent = 'startup images: YES (' + document.querySelectorAll('link[rel="apple-touch-startup-image"]').length + ' injected)'; })
      .catch(e => { document.getElementById('status').textContent = 'startup images: FAILED — ' + e; });
  </script>
</head>
<body style="margin:0;background:#ff0000;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;font-size:13px;gap:8px">
  <p style="margin:0">step 3 — library + visible icon + debug</p>
  <p id="status" style="margin:0;color:#888">startup images: pending...</p>
</body>
</html>
